name: Continuous Deployment

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version or tag to deploy (e.g. v1.0.0 or main)"
        required: true
        type: string

concurrency: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.event.inputs.version) || github.event.release.tag_name }}

jobs:
  deploy-cloudflare:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: meetfy@${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.event.release.tag_name }}

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.cache/turbo
            .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build
        run: pnpm run build

      - name: Deploy Worker (Wrangler)
        run: pnpm run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
