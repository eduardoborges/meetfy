name: Continuous Deployment

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Dist-tag for worker checkout (e.g. main) and npm version for PKGBUILD (e.g. 1.0.6 or v1.0.6); tarball must exist on npm."
        required: true
        type: string

concurrency: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.event.inputs.version) || github.event.release.tag_name }}

jobs:
  deploy-cloudflare:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: meetfy@${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.event.release.tag_name }}

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.cache/turbo
            .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build
        run: pnpm run build

      - name: Deploy Worker (Wrangler)
        run: pnpm run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  update-aur-pkgbuild:
    name: Sync AUR PKGBUILD (pkgver + sha256)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve pkgver
        id: ver
        run: |
          raw="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.event.release.tag_name }}"
          pkgver="${raw#v}"
          echo "pkgver=${pkgver}" >> "${GITHUB_OUTPUT}"
          echo "Using pkgver=${pkgver} (from ${raw})"

      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download npm tarball and patch PKGBUILD
        env:
          PKGVER: ${{ steps.ver.outputs.pkgver }}
        run: |
          set -euo pipefail
          url="https://registry.npmjs.org/meetfy/-/meetfy-${PKGVER}.tgz"
          echo "Fetching ${url}"
          sum="$(curl -fsSL "${url}" | sha256sum | awk '{print $1}')"
          echo "sha256=${sum}"

          old_ver="$(grep '^pkgver=' aur/PKGBUILD | cut -d= -f2)"
          old_rel="$(grep '^pkgrel=' aur/PKGBUILD | cut -d= -f2)"
          if [ "${old_ver}" = "${PKGVER}" ] && [ -n "${old_rel}" ]; then
            pkgrel=$((old_rel + 1))
          else
            pkgrel=1
          fi

          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=${pkgrel}/" aur/PKGBUILD
          sed -i "s/^sha256sums=('[^']*')/sha256sums=('${sum}')/" aur/PKGBUILD

      - name: Commit and push
        env:
          PKGVER: ${{ steps.ver.outputs.pkgver }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aur/PKGBUILD
          if git diff --staged --quiet; then
            echo "PKGBUILD already up to date."
          else
            git commit -m "chore(aur): meetfy ${PKGVER}"
            git push
          fi
