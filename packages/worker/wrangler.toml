name = "meetfy"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Custom domain (configure zone in Cloudflare Dashboard if needed)
[route]
pattern = "meetfy.eduardoborges.dev"
custom_domain = true

# Secrets (set via: wrangler secret put GOOGLE_CLIENT_ID, etc.)
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET

[observability]
enabled = true
traces = { enabled = true }

[placement]
mode = "smart"